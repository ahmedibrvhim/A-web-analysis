<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A | Lower Third Calculator</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── HERO (logo only) ── */
#hero {
  min-height:calc(100vh - var(--nav-h) - 3px);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  background:radial-gradient(ellipse at center, #150000 0%, #000 65%);
  text-align:center; padding:40px 20px;
  animation:heroFadeIn .8s ease;
}
@keyframes heroFadeIn { from{opacity:0} to{opacity:1} }
.hero-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(139,0,0,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(139,0,0,.04) 1px,transparent 1px);
  background-size:60px 60px;
}
.hero-glow {
  position:absolute; width:640px; height:640px;
  background:radial-gradient(circle, rgba(139,0,0,.16) 0%, transparent 70%);
  top:50%; left:50%; transform:translate(-50%,-50%);
  animation:gPulse 5s ease-in-out infinite;
}
@keyframes gPulse {
  0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
}
.hero-skull-ring {
  position:relative; z-index:2;
  width:220px; height:220px; border-radius:50%;
  border:2px solid var(--blood);
  box-shadow:0 0 60px rgba(139,0,0,.45), 0 0 120px rgba(139,0,0,.15),
             inset 0 0 60px rgba(0,0,0,.7);
  overflow:hidden; margin-bottom:34px;
  animation:skullFloat 6s ease-in-out infinite;
}
@keyframes skullFloat {
  0%,100%{transform:translateY(0);box-shadow:0 0 60px rgba(139,0,0,.45),0 0 120px rgba(139,0,0,.15)}
  50%{transform:translateY(-12px);box-shadow:0 0 90px rgba(139,0,0,.7),0 0 180px rgba(139,0,0,.25)}
}
.hero-skull-ring img { width:100%; height:100%; object-fit:cover; filter:brightness(.85) contrast(1.1); }
.hero-title {
  position:relative; z-index:2;
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(70px,14vw,110px);
  font-weight:900; color:var(--white);
  letter-spacing:24px; line-height:1;
  text-shadow:0 0 40px var(--blood), 0 0 80px rgba(139,0,0,.4);
  animation:titlePulse 4s ease-in-out infinite;
}
@keyframes titlePulse {
  0%,100%{text-shadow:0 0 40px var(--blood),0 0 80px rgba(158, 1, 1, 0.4)}
  50%{text-shadow:0 0 60px var(--crimson),0 0 120px rgba(220,20,60,.5)}
}
.hero-sub {
  position:relative; z-index:2;
  font-size:9px; letter-spacing:8px;
  color:var(--blood); text-transform:uppercase;
  margin:14px 0 0; text-align:center;
}

/* ── MOBILE NAV ── */
.hamburger {
  display: none; flex-direction: column; justify-content: center;
  gap: 5px; background: none; border: 1px solid var(--blood);
  padding: 8px 10px; cursor: pointer; margin-left: auto; flex-shrink: 0;
}
.hamburger span { display: block; width: 22px; height: 2px; background: var(--blood); transition: all .3s; }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

@media (max-width: 768px) {
  nav { flex-wrap: wrap; padding: 0 14px; gap: 0; height: auto; min-height: 58px; }
  .nav-logo { padding: 10px 0; flex: 1; }
  .hamburger { display: flex; }
  .nav-links { display: none; flex-direction: column; width: 100%; order: 3; border-top: 1px solid var(--border); padding: 8px 0; gap: 0; }
  .nav-links.mobile-open { display: flex; }
  .nav-links li { width: 100%; }
  .nav-links a { display: block; padding: 12px 4px; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 10px; letter-spacing: 3px; }
  .nav-right { display: none; flex-direction: column; width: 100%; order: 4; padding: 10px 0 14px; gap: 8px; border-top: 1px solid var(--border); }
  .nav-right.mobile-open { display: flex; }
  .btn-ghost { width: 100%; text-align: center; justify-content: center; }
  .user-pill { flex-wrap: wrap; width: 100%; gap: 8px; }
  .hero-title { letter-spacing: 10px; }
  .hero-skull-ring { width: 160px; height: 160px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">
    <img src="Skull.png" alt="Brand A">
    <div>
      <div class="logo-mark">A</div>
    </div>
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html" class="active">Home</a></li>
  </ul>
  <button class="hamburger" id="hamburger" onclick="toggleMobileNav()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-right" id="navRight">
    <a class="btn-ghost" href="login.html">Login / Register</a>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-grid"></div>
  <div class="hero-glow"></div>
  <div class="hero-skull-ring">
    <img src="Skull.png" alt="Skull">
  </div>
  <div class="hero-title">A</div>
</section>

<script>
function toggleMobileNav() {
  const hamburger = document.getElementById('hamburger');
  const navLinks  = document.getElementById('navLinks');
  const navRight  = document.getElementById('navRight');
  const open = hamburger.classList.toggle('open');
  navLinks.classList.toggle('mobile-open', open);
  navRight.classList.toggle('mobile-open', open);
}
window.toggleMobileNav = toggleMobileNav;
document.getElementById('navLinks').addEventListener('click', e => {
  if (e.target.tagName === 'A') {
    document.getElementById('hamburger').classList.remove('open');
    document.getElementById('navLinks').classList.remove('mobile-open');
    document.getElementById('navRight').classList.remove('mobile-open');
  }
});
</script>

<script type="module">
import {
  auth, db, onAuthStateChanged, signOut, doc, getDoc
} from './firebase-config.js';

onAuthStateChanged(auth, async user => {
  const nr = document.getElementById('navRight');
  if (user) {
    try {
      const userSnap = await getDoc(doc(db, 'users', user.uid));
      if (!userSnap.exists()) {
        await signOut(auth);
        localStorage.removeItem('brandA_user');
        sessionStorage.setItem('accountRemoved', '1');
        window.location.href = 'login.html';
        return;
      }
    } catch(e) { /* network error — let them through */ }

    let displayName = user.displayName || '';
    if (!displayName) {
      const storedUser = JSON.parse(localStorage.getItem('brandA_user') || '{}');
      displayName = storedUser.name?.trim() || user.email.split('@')[0];
    }

    const avatarSrc = (user.photoURL && user.photoURL.startsWith('http')) ? user.photoURL : 'Skull.png';

    nr.innerHTML = '<div class="user-pill">'+
      '<img class="user-avatar" id="navAvatarImg">'+
      '<span class="user-name">'+displayName+'</span>'+
      '<button class="btn-logout" id="logoutBtn">Sign out</button>'+
      '</div>';

    const avatarEl = document.getElementById('navAvatarImg');
    avatarEl.src = avatarSrc;
    avatarEl.onerror = function() { this.onerror = null; this.src = 'Skull.png'; };

    document.getElementById('logoutBtn').onclick = () => {
      signOut(auth).then(() => {
        localStorage.removeItem('brandA_user');
        location.reload();
      });
    };
  } else {
    // No signed-in user — this page requires auth, so bounce to login.
    sessionStorage.setItem('authRequired', '1');
    window.location.href = 'login.html';
    return;
  }
});
</script>
</body>
</html>
