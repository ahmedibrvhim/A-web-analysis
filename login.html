<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A — Login / Register</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── AUTH PAGE SPECIFIC ── */
.auth-wrap {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 100px 20px 60px;
  background: radial-gradient(ellipse at 50% 0%, #1a0000 0%, #000 60%);
  position: relative;
}

/* giant bg letter */
.auth-wrap::before {
  content: '𝕬';
  position: absolute;
  font-family: 'UnifrakturMaguntia', cursive;
  font-size: 60vw;
  color: rgba(139,0,0,0.025);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  user-select: none;
}

.auth-box {
  position: relative; z-index: 2;
  width: 100%; max-width: 440px;
  background: rgba(6,0,0,0.98);
  border: 1px solid rgba(139,0,0,0.45);
  box-shadow: 0 0 80px rgba(139,0,0,0.15);
  animation: boxIn .4s ease;
}
@keyframes boxIn {
  from { opacity:0; transform:translateY(-16px) scale(.98); }
  to   { opacity:1; transform:none; }
}

/* top red line accent */
.auth-box::before {
  content: '';
  position: absolute; top: -1px; left: 15%; right: 15%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--blood-bright), transparent);
}

/* ── HEADER ── */
.auth-head {
  background: rgba(10,0,0,0.8);
  border-bottom: 1px solid rgba(139,0,0,0.3);
  padding: 24px 32px;
  display: flex; align-items: center; justify-content: space-between;
}
.auth-head-logo {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 20px; color: var(--light);
  letter-spacing: 6px;
  text-shadow: 0 0 14px var(--blood);
}
.auth-head-sub {
  font-size: 7px; letter-spacing: 3px;
  color: var(--blood-mid); margin-top: 3px;
  text-transform: uppercase;
}
.auth-skull-img {
  width: 40px; height: 40px;
  border-radius: 50%; object-fit: cover;
  border: 1px solid rgba(139,0,0,0.5);
}

/* ── BODY ── */
.auth-body { padding: 30px 32px 28px; }

/* ── TABS ── */
.auth-tabs {
  display: flex;
  border-bottom: 1px solid rgba(139,0,0,0.2);
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1; padding: 11px 0;
  font-family: 'Cinzel', serif;
  font-size: 0.65rem; letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gray); background: none; border: none;
  cursor: pointer; transition: color .25s;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.auth-tab.active { color: var(--blood-bright); border-bottom-color: var(--blood-bright); }
.auth-tab:hover:not(.active) { color: var(--bone); }

/* ── MESSAGES ── */
.msg-bar {
  padding: 10px 14px;
  font-family: 'IM Fell English', serif;
  font-style: italic; font-size: 0.82rem;
  letter-spacing: 0.5px; margin-bottom: 16px;
  display: none; line-height: 1.5;
}
.msg-bar.error {
  display: block;
  background: rgba(139,0,0,0.12);
  border-left: 3px solid var(--blood-bright);
  color: #ff7777;
}
.msg-bar.success {
  display: block;
  background: rgba(0,100,0,0.15);
  border-left: 3px solid #00aa00;
  color: #88cc88;
}
.msg-bar.info {
  display: block;
  background: rgba(0,50,100,0.15);
  border-left: 3px solid #4488cc;
  color: #aaccff;
}

/* ── FORM FIELDS ── */
.form-field { margin-bottom: 16px; }
.form-lbl {
  display: block;
  font-size: 0.6rem; letter-spacing: 3px;
  text-transform: uppercase; color: var(--bone);
  margin-bottom: 7px; opacity: 0.65;
}
.form-inp {
  width: 100%;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(139,0,0,0.2);
  color: var(--light);
  font-family: 'IM Fell English', serif; font-size: 0.95rem;
  padding: 12px 14px; outline: none;
  transition: border-color .3s, box-shadow .3s;
}
.form-inp:focus {
  border-color: var(--blood);
  box-shadow: 0 0 14px rgba(139,0,0,0.15);
}
.form-inp::placeholder { color: #2a2a2a; }

/* ── FORGOT PASSWORD LINK ── */
.forgot-link {
  display: block; text-align: right;
  font-size: 0.6rem; letter-spacing: 2px;
  color: var(--gray); text-decoration: none;
  text-transform: uppercase; margin-top: -8px;
  margin-bottom: 18px; transition: color .2s;
}
.forgot-link:hover { color: var(--blood-bright); }

/* ── SUBMIT BUTTON ── */
.auth-submit {
  width: 100%; padding: 15px;
  font-family: 'Cinzel', serif;
  font-size: 0.72rem; letter-spacing: 4px;
  text-transform: uppercase; color: #fff;
  background: var(--blood);
  border: 1px solid var(--blood-mid);
  cursor: pointer;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  transition: background .3s, box-shadow .3s;
}
.auth-submit:hover { background: var(--blood-bright); box-shadow: 0 0 24px rgba(204,0,0,0.4); }
.auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── STRENGTH BAR ── */
.strength-wrap { margin-top: 6px; }
.strength-bar-bg {
  height: 3px; background: #111;
  border-radius: 2px; overflow: hidden;
}
.strength-bar-fill {
  height: 100%; width: 0;
  border-radius: 2px;
  transition: width .3s, background .3s;
}
.strength-label {
  font-size: 0.55rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--ash);
  display: block; margin-top: 4px;
}

/* ── CONFIRM MATCH ── */
.match-hint {
  font-size: 0.6rem; letter-spacing: 1px;
  margin-top: 4px; display: none;
}
.match-hint.ok  { display: block; color: #66bb66; }
.match-hint.bad { display: block; color: #cc4444; }

/* ── BACK LINK ── */
.back-home {
  display: block; text-align: center; margin-top: 20px;
  font-size: 0.6rem; letter-spacing: 3px; color: var(--gray);
  text-decoration: none; text-transform: uppercase; transition: color .2s;
}
.back-home:hover { color: var(--blood-bright); }

/* ── RESET PASSWORD PANEL ── */
.reset-intro {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 0.85rem; color: var(--bone); opacity: 0.85;
  line-height: 1.6; margin-bottom: 22px;
}
.reset-intro strong { color: var(--blood-bright); font-style: normal; }

/* ── SPINNER ── */
.spinner {
  display: inline-block; width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── AUTH BOX ── -->
<div class="auth-wrap">
  <div class="auth-box">

    <!-- header -->
    <div class="auth-head">
      <div>
        <div class="auth-head-logo">A</div>
        <div class="auth-head-sub">☠ Client Portal ☠</div>
      </div>
      <img class="auth-skull-img" src="Skull.png" alt="skull">
    </div>

    <!-- body -->
    <div class="auth-body">

      <!-- tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tabReg" onclick="switchTab('register')">Register</button>
      </div>

      <!-- messages -->
      <div class="msg-bar" id="msgBar"></div>

      <!-- ══ LOGIN FORM ══ -->
      <div id="loginForm">
        <div class="form-field">
          <label class="form-lbl">Email Address</label>
          <input class="form-inp" type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-field">
          <label class="form-lbl">Password</label>
          <input class="form-inp" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <a class="forgot-link" href="#" onclick="handleForgotPassword(event)">Forgot password?</a>
        <button class="auth-submit" id="loginBtn" onclick="handleLogin()">☠ &nbsp; Sign In</button>
      </div>

      <!-- ══ REGISTER FORM ══ -->
      <div id="registerForm" style="display:none">
        <div class="form-field">
          <label class="form-lbl">Full Name</label>
          <input class="form-inp" type="text" id="regName" placeholder="Your name" autocomplete="name">
        </div>
        <div class="form-field">
          <label class="form-lbl">Email Address</label>
          <input class="form-inp" type="email" id="regEmail" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-field">
          <label class="form-lbl">Password (min 6 characters)</label>
          <input class="form-inp" type="password" id="regPass" placeholder="••••••••" autocomplete="new-password">
          <div class="strength-wrap">
            <div class="strength-bar-bg">
              <div class="strength-bar-fill" id="strengthBar"></div>
            </div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>
        </div>
        <div class="form-field">
          <label class="form-lbl">Confirm Password</label>
          <input class="form-inp" type="password" id="regConfirm" placeholder="••••••••" autocomplete="new-password">
          <span class="match-hint" id="matchHint"></span>
        </div>
        <button class="auth-submit" id="regBtn" onclick="handleRegister()">☠ &nbsp; Create Account</button>
      </div>

      <!-- ══ RESET PASSWORD FORM (shown when arriving via the emailed reset link) ══ -->
      <div id="resetForm" style="display:none">
        <p class="reset-intro">Enter a new password for <strong id="resetEmailLabel"></strong></p>
        <div class="form-field">
          <label class="form-lbl">New Password (min 6 characters)</label>
          <input class="form-inp" type="password" id="resetPass" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="form-field">
          <label class="form-lbl">Confirm New Password</label>
          <input class="form-inp" type="password" id="resetConfirm" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button class="auth-submit" id="resetBtn" onclick="handleResetPassword()">☠ &nbsp; Set New Password</button>
      </div>

      <div class="or-divider" id="orDivider">
        <div class="or-line"></div>
        <span class="or-text">Or</span>
        <div class="or-line"></div>
      </div>

      <button class="btn-google" id="googleBtn" onclick="handleGoogleSignIn()">
        <svg class="g-icon" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.9-2.26 5.36-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- ══ FIREBASE MODULE ══ -->
<script type="module">
import {
  auth, db, googleProvider,
  signInWithPopup,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  updateProfile,
  doc, setDoc, getDoc, serverTimestamp
} from './firebase-config.js';

// also import password-reset helpers separately
import { sendPasswordResetEmail, verifyPasswordResetCode, confirmPasswordReset }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

/* ─────────── detect an incoming password-reset link ─────────── */
/* Firebase appends ?mode=resetPassword&oobCode=... to the URL we
   configure below (instead of sending users to Firebase's own plain
   reset page), so we can render our own branded form for it. */
const _resetParams = new URLSearchParams(window.location.search);
let handlingPasswordReset =
  _resetParams.get('mode') === 'resetPassword' && !!_resetParams.get('oobCode');
const _resetOobCode = _resetParams.get('oobCode');

/* ─────────── redirect if already logged in ─────────── */
// Flag to block redirect until Firestore write finishes on register
let _savingUser = false;

// Tracks if a removed-user message should show after forced sign-out
let _removedUser = false;

onAuthStateChanged(auth, async user => {
  if (user) {
    // Login/register is actively running — it handles everything itself, skip here
    if (_savingUser) return;
    // We're showing the "set new password" screen — don't redirect away from it
    if (handlingPasswordReset) return;

    // ── DELETED USER CHECK ──
    // Only runs on page load (not during login/register).
    // If doc is missing, sign them out so the login flow re-saves them.
    try {
      const userSnap = await getDoc(doc(db, 'users', user.uid));
      if (!userSnap.exists()) {
        sessionStorage.setItem('accountRemoved', '1');
        await signOut(auth);
        localStorage.removeItem('brandA_user');
        return;
      }
    } catch(e) { /* network error — let them through */ }

    const existing = JSON.parse(localStorage.getItem('brandA_user') || 'null');
    const savedName = (existing && existing.name) ? existing.name : (user.displayName || user.email.split('@')[0]);
    localStorage.setItem('brandA_user', JSON.stringify({
      uid:   user.uid,
      name:  user.displayName || savedName,
      email: user.email,
      photo: user.photoURL || ''
    }));
    window.location.href = 'home.html';
  } else {
    // Show message only if forced sign-out came from page-load check above
    if (sessionStorage.getItem('accountRemoved')) {
      sessionStorage.removeItem('accountRemoved');
      showMsg('Your account was removed. Please sign in again to restore access.', 'error');
    } else if (sessionStorage.getItem('authRequired')) {
      sessionStorage.removeItem('authRequired');
      showMsg('Sign in or register to unlock the Tool. ☠', 'info');
    }
  }
});

/* ─────────── UI helpers ─────────── */
function showMsg(text, type = 'error') {
  const el = document.getElementById('msgBar');
  el.textContent = text;
  el.className   = 'msg-bar ' + type;
}
function clearMsg() {
  const el = document.getElementById('msgBar');
  el.className = 'msg-bar';
  el.textContent = '';
}

function setLoading(id, on) {
  const b = document.getElementById(id);
  if (!b._orig) b._orig = b.innerHTML;
  b.disabled   = on;
  b.innerHTML  = on ? '<span class="spinner"></span> Please wait...' : b._orig;
}

function isValidEmail(e) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
}

/* ─────────── Tab switch ─────────── */
window.switchTab = (tab) => {
  const isLogin = tab === 'login';
  document.getElementById('loginForm').style.display    = isLogin ? '' : 'none';
  document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabReg').classList.toggle('active', !isLogin);
  clearMsg();
};

/* ─────────── Save user to Firestore ─────────── */
async function saveUser(user, extraName = '') {
  const ref  = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      uid:         user.uid,
      displayName: user.displayName || extraName || user.email.split('@')[0],
      email:       user.email,
      photoURL:    user.photoURL || '',
      createdAt:   serverTimestamp(),
      orders:      []
    });
  }
}

/* ─────────── Firebase error → readable ─────────── */
function errMsg(code) {
  const map = {
    'auth/user-not-found':       'No account found with this email. Please register.',
    'auth/wrong-password':       'Incorrect password. Try again or reset it.',
    'auth/invalid-credential':   'Invalid email or password.',
    'auth/email-already-in-use': 'This email is already registered.',
    'auth/weak-password':        'Password must be at least 6 characters.',
    'auth/invalid-email':        'Please enter a valid email address.',
    'auth/too-many-requests':    'Too many attempts. Please wait a few minutes.',
    'auth/network-request-failed':'Network error. Check your connection.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

/* ─────────── LOGIN ─────────── */
window.handleLogin = async () => {
  clearMsg();
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;

  if (!isValidEmail(email)) { showMsg('Please enter a valid email.'); return; }
  if (!pass)                 { showMsg('Please enter your password.'); return; }

  setLoading('loginBtn', true);
  _savingUser = true; // set BEFORE signIn so onAuthStateChanged is blocked during entire login
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    await saveUser(cred.user); // creates Firestore doc if it was removed by admin
    localStorage.setItem('brandA_user', JSON.stringify({
      uid:   cred.user.uid,
      name:  cred.user.displayName || cred.user.email.split('@')[0],
      email: cred.user.email,
      photo: cred.user.photoURL || ''
    }));
    _savingUser = false;
    showToastMsg('💀 Welcome back!');
    window.location.href = 'home.html';
  } catch (e) {
    _savingUser = false;
    showMsg(errMsg(e.code));
  } finally {
    setLoading('loginBtn', false);
  }
};

/* ─────────── REGISTER ─────────── */
window.handleRegister = async () => {
  clearMsg();
  const name    = document.getElementById('regName').value.trim();
  const email   = document.getElementById('regEmail').value.trim();
  const pass    = document.getElementById('regPass').value;
  const confirm = document.getElementById('regConfirm').value;

  if (!name)                 { showMsg('Please enter your name.'); return; }
  if (!isValidEmail(email))  { showMsg('Please enter a valid email.'); return; }
  if (pass.length < 6)       { showMsg('Password must be at least 6 characters.'); return; }
  if (pass !== confirm)      { showMsg('Passwords do not match.'); return; }

  setLoading('regBtn', true);
  _savingUser = true; // block onAuthStateChanged redirect until Firestore write finishes
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await saveUser(cred.user, name); // Firestore write completes before redirect
    localStorage.setItem('brandA_user', JSON.stringify({
      uid:   cred.user.uid,
      name:  name,
      email: cred.user.email,
      photo: cred.user.photoURL || ''
    }));
    showMsg('Account created! Redirecting...', 'success');
    showToastMsg('💀 Welcome to Brand A!');
    _savingUser = false;
    window.location.href = 'home.html';
  } catch (e) {
    _savingUser = false;
    showMsg(errMsg(e.code));
  } finally {
    setLoading('regBtn', false);
  }
};

/* ─────────── GOOGLE SIGN-IN ─────────── */
window.handleGoogleSignIn = async () => {
  clearMsg();
  setLoading('googleBtn', true);
  _savingUser = true; // block onAuthStateChanged redirect until Firestore write finishes
  try {
    const cred = await signInWithPopup(auth, googleProvider);
    await saveUser(cred.user);
    localStorage.setItem('brandA_user', JSON.stringify({
      uid:   cred.user.uid,
      name:  cred.user.displayName || cred.user.email.split('@')[0],
      email: cred.user.email,
      photo: cred.user.photoURL || ''
    }));
    _savingUser = false;
    showToastMsg('💀 Welcome!');
    window.location.href = 'home.html';
  } catch (e) {
    _savingUser = false;
    if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') {
      showMsg(errMsg(e.code));
    }
  } finally {
    setLoading('googleBtn', false);
  }
};

/* ─────────── FORGOT PASSWORD ─────────── */
/* This sends a REAL email from Firebase to the user's Gmail */
window.handleForgotPassword = async (e) => {
  e.preventDefault();
  clearMsg();

  const email = document.getElementById('loginEmail').value.trim();
  if (!isValidEmail(email)) {
    showMsg('Enter your email address in the field above first, then click "Forgot password?".');
    return;
  }

  showMsg('Sending reset email...', 'info');
  try {
    const actionCodeSettings = {
      url: window.location.origin + window.location.pathname,
      handleCodeInApp: true
    };
    await sendPasswordResetEmail(auth, email, actionCodeSettings);
    showMsg(
      '✓ Password reset email sent to ' + email + '. Check your inbox (and spam folder).',
      'success'
    );
  } catch (e) {
    const map = {
      'auth/user-not-found': 'No account found with this email address.',
      'auth/invalid-email':  'Please enter a valid email address.',
      'auth/too-many-requests': 'Too many requests. Please wait before trying again.',
    };
    showMsg(map[e.code] || 'Could not send reset email. Please try again.');
  }
};

/* ─────────── Branded reset-password screen ─────────── */
function showResetUI(show) {
  document.querySelector('.auth-tabs').style.display = show ? 'none' : '';
  document.getElementById('loginForm').style.display    = show ? 'none' : '';
  document.getElementById('registerForm').style.display = 'none';
  document.getElementById('orDivider').style.display    = show ? 'none' : '';
  document.getElementById('googleBtn').style.display    = show ? 'none' : '';
  document.getElementById('resetForm').style.display    = show ? '' : 'none';
}

async function initPasswordReset() {
  showResetUI(true);
  try {
    const email = await verifyPasswordResetCode(auth, _resetOobCode);
    document.getElementById('resetEmailLabel').textContent = email;
  } catch (e) {
    // Bad, used, or expired link — fall back to the normal login screen
    handlingPasswordReset = false;
    showResetUI(false);
    switchTab('login');
    showMsg('This password reset link is invalid or has expired. Please request a new one.');
  }
}

window.handleResetPassword = async () => {
  clearMsg();
  const pass    = document.getElementById('resetPass').value;
  const confirm = document.getElementById('resetConfirm').value;

  if (!pass || pass.length < 6) { showMsg('Password must be at least 6 characters.'); return; }
  if (pass !== confirm)         { showMsg('Passwords do not match.'); return; }

  setLoading('resetBtn', true);
  try {
    await confirmPasswordReset(auth, _resetOobCode, pass);
    handlingPasswordReset = false;
    window.history.replaceState({}, document.title, window.location.pathname); // strip ?mode&oobCode
    showResetUI(false);
    switchTab('login');
    showMsg('✓ Password updated. Please sign in with your new password.', 'success');
    showToastMsg('💀 Password updated!');
  } catch (e) {
    const map = {
      'auth/expired-action-code': 'This reset link has expired. Please request a new one.',
      'auth/invalid-action-code': 'This reset link is invalid or has already been used.',
      'auth/weak-password':       'Password must be at least 6 characters.',
    };
    showMsg(map[e.code] || 'Could not reset password. Please try again.');
  } finally {
    setLoading('resetBtn', false);
  }
};

if (handlingPasswordReset) initPasswordReset();

/* ─────────── Password strength ─────────── */
document.getElementById('regPass').addEventListener('input', function () {
  const val = this.value;
  const bar = document.getElementById('strengthBar');
  const lbl = document.getElementById('strengthLabel');
  if (!val) { bar.style.width = '0'; lbl.textContent = ''; return; }
  let score = 0;
  if (val.length >= 6)          score++;
  if (val.length >= 10)         score++;
  if (/[A-Z]/.test(val))        score++;
  if (/[0-9]/.test(val))        score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { w:'20%', c:'#8b0000', l:'Very Weak' },
    { w:'40%', c:'#cc3300', l:'Weak' },
    { w:'60%', c:'#cc7700', l:'Fair' },
    { w:'80%', c:'#4caf50', l:'Strong' },
    { w:'100%',c:'#2e7d32', l:'Very Strong' },
  ];
  const lv = levels[Math.max(0, score - 1)];
  bar.style.width      = lv.w;
  bar.style.background = lv.c;
  lbl.textContent      = lv.l;
});

/* ─────────── Confirm password match ─────────── */
document.getElementById('regConfirm').addEventListener('input', function () {
  const pass = document.getElementById('regPass').value;
  const hint = document.getElementById('matchHint');
  if (!this.value) { hint.className = 'match-hint'; return; }
  if (this.value === pass) {
    hint.className = 'match-hint ok'; hint.textContent = '✓ Passwords match';
  } else {
    hint.className = 'match-hint bad'; hint.textContent = '✗ Passwords do not match';
  }
});

/* ─────────── Enter key support ─────────── */
['loginEmail','loginPass'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleLogin();
  })
);
['regName','regEmail','regPass','regConfirm'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleRegister();
  })
);

/* ─────────── Toast ─────────── */
function showToastMsg(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
